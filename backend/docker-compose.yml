services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-videowala}
      POSTGRES_USER: ${POSTGRES_USER:-videowala}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-videowala}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
